<div>
  <div class="title">بيانات المورد</div>
  <form class="form" action="">
    <div class="form-row">
      <label class="row-label" for="username">اسم المورد *</label>
      <div class="input-field">
        <input autocomplete="off" type="text" name="text" id="username" />
      </div>
    </div>

    <div class="form-row button-row">
      <div class="btn-container">
        <button type="button" class="btn" (click)="onSaveClick()">حفظ</button>
      </div>
      <div class="btn-container">
        <button type="button" class="btn cancel-btn" (click)="onSaveClick()">إلغاء</button>
      </div>
    </div>

  </form>
</div>
