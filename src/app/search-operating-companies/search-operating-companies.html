<div>
  <form class="form">
    <div class="form-row">
      <div class="title" style="width: 500%;">الشركات العاملة</div>
      
    </div>
  </form>
</div>
<hr />

<div>
  <form class="form">
    <table>
      <tr>
        <td style="width: 15%;">اسم الشركة</td>
        <td style="width: 35%;">
          <div class="input-field" style="width: 85%;">
            <input autocomplete="off" type="text" name="text" id="numberDevice" />
          </div>
        </td>
      </tr>


    </table>

    <div class="form-row button-row">
      <div class="btn-container">
        <button type="button" class="btn" (click)="onSearchClick()">بحث</button>
      </div>
      <div class="btn-container">
        <button type="button" class="btn cancel-btn" (click)="onSearchClick()">إلغاء</button>
      </div>
    </div>
  </form>
</div>

<section class="table-card" aria-label="نتائج البحث">
  <header class="table-card-header">
    <h3 class="table-title">نتائج البحث</h3>
  </header>

  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" class="units-table">
      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef> م </th>
        <td mat-cell *matCellDef="let element"> {{ element.position }} </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> اسم الشركة </th>
        <td mat-cell *matCellDef="let element"> {{ element.name }} </td>
      </ng-container>

      <ng-container matColumnDef="decisionNumber">
        <th mat-header-cell *matHeaderCellDef> رقم القرار </th>
        <td mat-cell *matCellDef="let element"> {{ element.decisionNumber }} </td>
      </ng-container>

      <ng-container matColumnDef="decisionDate">
        <th mat-header-cell *matHeaderCellDef> تاريخ القرار </th>
        <td mat-cell *matCellDef="let element"> {{ element.decisionDate }} </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> حالة الشركة </th>
        <td mat-cell *matCellDef="let element"> {{ element.status }} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>إجراءات</th>
        <td mat-cell *matCellDef="let element">
          <div class="action-buttons">
            <button type="button" mat-icon-button class="edit-btn" aria-label="تعديل" title="تعديل" (click)="onAddClick()">
              <span class="material-icons">edit</span>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <style>
      .action-buttons {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: flex-start;
      }

      .action-buttons .edit-btn {
        background: linear-gradient(135deg, #1976d2, #64b5f6);
        color: #fff;
        border-radius: 8px;
        padding: 8px 10px;
        box-shadow: 0 2px 8px #1976d263;
        transition: background 0.2s, box-shadow 0.2s;
        position: relative;
        overflow: hidden;
      }

      .action-buttons .delete-btn {
        background: linear-gradient(135deg, #d32f2f, #ff5252);
        color: #fff;
        border-radius: 8px;
        padding: 8px 10px;
        box-shadow: 0 2px 8px #d32f2f63;
        transition: background 0.2s, box-shadow 0.2s;
        position: relative;
        overflow: hidden;
      }

      .action-buttons .attachments-btn {
        background: linear-gradient(135deg, #0f766e, #34d399);
        color: #fff;
        border-radius: 10px;
        padding: 8px 10px;
        border: 1px solid #ffffff40;
        box-shadow: 0 3px 10px #0f766e66;
        transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        position: relative;
        overflow: hidden;
      }

      .action-buttons .attachments-btn:hover {
        transform: translateY(-1px) scale(1.03);
        box-shadow: 0 5px 14px #0f766e80;
        filter: saturate(1.08);
      }

      .action-buttons button .material-icons {
        vertical-align: middle;
        font-size: 1.2rem;
      }
    </style>
  </div>
</section>
